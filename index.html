// Compute total score
stories.forEach(s => { s.totalScore = s.scores.convo + s.scores.gov + s.scores.impact; });

let currentFilter = 'all';
let currentSort = 'score';

function getScoreClass(total) {
  if (total >= 12) return 'score-high';
  if (total >= 8) return 'score-mid';
  return 'score-low';
}

function sortStories(list, sortKey) {
  return [...list].sort((a, b) => {
    if (sortKey === 'score') return b.totalScore - a.totalScore;
    if (sortKey === 'convo') return b.scores.convo - a.scores.convo || b.totalScore - a.totalScore;
    if (sortKey === 'gov') return b.scores.gov - a.scores.gov || b.totalScore - a.totalScore;
    if (sortKey === 'impact') return b.scores.impact - a.scores.impact || b.totalScore - a.totalScore;
    if (sortKey === 'category') return a.category.localeCompare(b.category) || b.totalScore - a.totalScore;
    return 0;
  });
}

function renderDots(val) {
  return Array.from({length: 5}, (_, i) => `<span class="score-dot ${i < val ? 'filled' : ''}"></span>`).join('');
}

function renderStories() {
  const container = document.getElementById('stories');
  let filtered = currentFilter === 'all' ? stories : stories.filter(s => s.category === currentFilter);
  filtered = sortStories(filtered, currentSort);

  container.innerHTML = filtered.map((s, idx) => {
    const sc = getScoreClass(s.totalScore);
    const isTop = s.totalScore >= 12;
    return `
    <div class="story-card ${isTop ? 'top-pick' : ''}">
      ${isTop ? '<div class="top-pick-label">Top Pick for the Blog</div>' : ''}
      <div class="story-top">
        <div class="story-top-left">
          <span class="story-tag ${s.tagClass}">${s.tag}</span>
        </div>
        <div class="score-badge ${sc}">${s.totalScore}/15</div>
      </div>
      <div class="score-breakdown">
        <div class="score-item">Debate <div class="score-dots">${renderDots(s.scores.convo)}</div></div>
        <div class="score-item">Gov <div class="score-dots">${renderDots(s.scores.gov)}</div></div>
        <div class="score-item">Impact <div class="score-dots">${renderDots(s.scores.impact)}</div></div>
      </div>
      <div class="story-title">${s.title}</div>
      <div class="story-summary">${s.summary}</div>
      <button class="expand-toggle" onclick="toggleDetails(this, ${s.id})">Show details & blog angle</button>
      <div class="details-expanded" id="details-${s.id}">
        <ul class="key-points">${s.keyPoints.map(p => '<li>' + p + '</li>').join('')}</ul>
        <div class="blog-angle">
          <div class="blog-angle-label">Blog Angle</div>
          <div class="blog-angle-text">${s.blogAngle}</div>
        </div>
      </div>
      <div class="story-source">Source: <a href="${s.sourceUrl}" target="_blank" rel="noopener">${s.source}</a></div>
      <div class="action-row">
        <button class="action-btn" onclick="saveToNotes(${s.id}, this)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          Save to Notes
        </button>
        <button class="action-btn share-btn" onclick="shareStory(${s.id})">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 12v8a2 2 0 002 2h12a2 2 0 002-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          Share
        </button>
      </div>
    </div>`;
  }).join('');
}

function toggleDetails(btn, id) {
  const d = document.getElementById('details-' + id);
  const open = d.classList.toggle('open');
  btn.textContent = open ? 'Hide details' : 'Show details & blog angle';
}

// Filters
document.getElementById('filters').addEventListener('click', function(e) {
  if (!e.target.classList.contains('filter-btn')) return;
  this.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentFilter = e.target.dataset.cat;
  renderStories();
});

// Sort
document.querySelector('.sort-row').addEventListener('click', function(e) {
  if (!e.target.classList.contains('sort-btn')) return;
  this.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  e.target.classList.add('active');
  currentSort = e.target.dataset.sort;
  renderStories();
});

// Toast
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// Save
async function saveToNotes(id, btn) {
  const s = stories.find(x => x.id === id);
  if (!s) return;
  const noteText = [
    s.title, '', 'Score: ' + s.totalScore + '/15 (Debate: ' + s.scores.convo + ' | Gov: ' + s.scores.gov + ' | Impact: ' + s.scores.impact + ')',
    '', 'Category: ' + s.tag, '', s.summary, '', 'KEY POINTS:', ...s.keyPoints.map(p => '• ' + p),
    '', 'BLOG ANGLE:', s.blogAngle, '', 'Source: ' + s.sourceUrl
  ].join('\n');

  if (navigator.share) {
    try {
      await navigator.share({ title: 'TI: ' + s.title, text: noteText });
      btn.classList.add('saved');
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg> Shared';
      return;
    } catch (err) { if (err.name === 'AbortError') return; }
  }

  if (window.cowork && window.cowork.callMcpTool) {
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin"><circle cx="12" cy="12" r="10" stroke-dasharray="30 70"/></svg> Saving...';
    btn.disabled = true;
    try {
      const noteBody = '<h1>' + s.title + '</h1>' +
        '<p><b>Score:</b> ' + s.totalScore + '/15 (Debate: ' + s.scores.convo + ' | Gov: ' + s.scores.gov + ' | Impact: ' + s.scores.impact + ')</p>' +
        '<p><b>Category:</b> ' + s.tag + '</p><p>' + s.summary + '</p>' +
        '<h2>Key Points</h2><ul>' + s.keyPoints.map(p => '<li>' + p + '</li>').join('') + '</ul>' +
        '<h2>Blog Angle</h2><p>' + s.blogAngle + '</p>' +
        '<p><b>Source:</b> <a href="' + s.sourceUrl + '">' + s.source + '</a></p>';
      const escaped = noteBody.replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/'/g, "'\\''");
      const escapedTitle = s.title.replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/'/g, "'\\''");
      await window.cowork.callMcpTool('mcp__Desktop_Commander__start_process', {
        command: "osascript -e 'tell application \"Notes\"\nset targetFolder to folder \"News Ideas\"\nmake new note at targetFolder with properties {name:\"" + escapedTitle + "\", body:\"" + escaped + "\"}\nend tell'",
        timeout_ms: 10000
      });
      btn.classList.add('saved');
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg> Saved';
      showToast('Saved to Apple Notes!');
      return;
    } catch (err) { btn.disabled = false; console.error(err); }
  }

  try {
    await navigator.clipboard.writeText(noteText);
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg> Copied!';
    showToast('Copied — paste into Notes');
    setTimeout(() => { btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> Save to Notes'; }, 3000);
  } catch (e) { showToast('Could not copy'); }
}

// Share
async function shareStory(id) {
  const s = stories.find(x => x.id === id);
  if (!s) return;
  const text = s.title + ' (' + s.totalScore + '/15)\n\n' + s.summary + '\n\nBlog angle: ' + s.blogAngle + '\n\n' + s.sourceUrl;
  if (navigator.share) {
    try { await navigator.share({ title: s.title, text }); } catch (e) {}
  } else {
    try { await navigator.clipboard.writeText(text); showToast('Copied!'); } catch (e) { showToast('Could not copy'); }
  }
}

renderStories();
</script>
