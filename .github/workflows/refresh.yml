name: Refresh TI News Briefing

on:
  schedule:
    - cron: '0 23 * * 2,5'  # 7pm ET / 23:00 UTC on Tuesdays and Fridays
  workflow_dispatch: {}    # Allow manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install anthropic feedparser requests

      - name: Fetch news and generate briefing
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python generate_briefing.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "News briefing update $(date -u +%Y-%m-%d)"
            git push
          fi
